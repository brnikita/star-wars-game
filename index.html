<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-2SO: Дроид-Изгой</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      cursor: crosshair;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s;
    }
    #loading-screen h1 {
      font-size: 3rem;
      letter-spacing: 0.5rem;
      text-transform: uppercase;
      color: #c0c0c0;
      margin-bottom: 2rem;
    }
    #loading-screen .subtitle {
      font-size: 1.2rem;
      color: #666;
      margin-bottom: 3rem;
    }
    #loading-bar-container {
      width: 300px;
      height: 4px;
      background: #333;
      border-radius: 2px;
    }
    #loading-bar {
      width: 0%;
      height: 100%;
      background: #4a9eff;
      border-radius: 2px;
      transition: width 0.3s;
    }
    #click-to-start {
      display: none;
      font-size: 1.1rem;
      color: #4a9eff;
      margin-top: 2rem;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="hud"></div>
  <div id="loading-screen">
    <h1>K-2SO</h1>
    <div class="subtitle">Дроид-Изгой</div>
    <div id="loading-bar-container">
      <div id="loading-bar"></div>
    </div>
    <div id="click-to-start">Нажмите для начала</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
